<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Gratheon app</title>
    <!-- WHY: viewport-fit=cover lets CSS paint mobile PWA safe areas instead of showing a stale system bar color. -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="theme-color" content="#ffffff"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>

    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/icon_16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icon_32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/icon_96x96.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/icon_128x128.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon_192x192.png">
    <link rel="icon" type="image/png" sizes="256x256" href="/icon_256x256.png">
    <link rel="icon" type="image/png" sizes="384x384" href="/icon_384x384.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon_512x512.png">

    <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
    />
    <link
            href="https://fonts.googleapis.com/css?family=Open+Sans:400,300,700&subset=latin,cyrillic"
            rel="stylesheet"
            type="text/css"
    />
    <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />

</head>
<body id="app"></body>
<script type="module" src="/src/main.tsx"></script>

</html>
